# ==============================================================================
# VIDX 16:9 Landscape Widescreen Project Configuration (Malayalam Philemon)
# ==============================================================================

project:
  name: "Malayalam Philemon - 16:9 Landscape"
  output_dir: "output/mal_landscape"

video:
  resolution: "1920x1080"       # 16:9 Full HD Widescreen
  fps: 24
  codec: "libx264"
  preset: "fast"
  crf: 23
  background_media: "src/mal/3840x2160.mp4"
  loop_background: true
  scaling_mode: "pad"

style:
  verse:
    font: "Bailey"
    size: 48
    color: "#FFFFFF"
    outline_color: "#000000"
    outline_width: 3
    shadow: 1
    alignment: 2                # Bottom-Center
    margin_bottom: 60
    margin_lr: 60
    background_box: true
    background_color: "#00000080"

  heading:
    font: "Bailey"
    size: 56
    color: "#FFD400"
    alignment: 8                # Top-Center
    margin_vertical: 80
    bold: true

  verse_number:
    show: true
    color: "#FFC080"
    size: 36
    on_every_segment: false

jobs:
  - usfm: "src/mal/58PHMMAL10RO.SFM"
    timing: "src/mal/C01-57-PHM-01-timing.txt"
    audio: "src/mal/phm/01.mp3"
