# ==============================================================================
# VIDX Project Configuration: Acts Scripture Videos
# ==============================================================================

project:
  name: "Acts — Sindhi Audio Bible"
  output_dir: "output/acts_sindhi"
  # generate_only: false          # Set to true if you only want to generate subtitle files (.ass/.srt) without video rendering

publishing:
  platform: "youtube"
  enabled: false                    # Disabled for local video generation
  generate_offline_package: true    # Generates YouTube Studio copy-paste ready metadata folders
  privacy_status: "unlisted"
  category_id: "22"
  playlist_name: "Acts — Sindhi Audio Bible"
  title_template: "Acts Chapter {chapter:02d} — Sindhi Audio Bible"
  description_template: |
    Listen to the Acts Chapter {chapter} in Sindhi.
    
    Generated automatically by VIDX Scripture Video Engine.
  tags:
    - "AudioBible"
    - "Sindhi"
    - "Acts"
    - "Scripture"

video:
  resolution: "1920x1080"           # 16:9 Widescreen
  fps: 24
  codec: "libx264"
  preset: "fast"
  crf: 23
  background_media: "src/snd/sindhi-audio-bible-artifacts/Background video/bg-video1.mp4" # Default fallback
  loop_background: true
  scaling_mode: "stretch"
  
  # Brand watermark overlay using logo
  watermark:
    image: "src/snd/sindhi-audio-bible-artifacts/Logo/logo.png"
    position: "top-right"
    margin: 40
    scale: 0.12                     # 12% of video width

audio:
  codec: "aac"
  bitrate: "192k"
  sample_rate: 48000
  fade_in_sec: 1.0
  fade_out_sec: 1.5
  
  # Background music details
  background_music: "src/snd/sindhi-audio-bible-artifacts/Background audio/bg-music1.mp3"
  background_music_volume: 0.12

style:
  verse:
    font: "Nirmala UI"              # Standard Windows font with excellent Sindhi/Arabic script support
    size: 64
    color: "#FFFFFF"
    outline_color: "#000000"
    outline_width: 3
    shadow: 1
    alignment: 2                    # Bottom-Center
    margin_bottom: 65
    margin_lr: 80
    background_box: false
    background_color: "#00000085"

  heading:
    font: "Nirmala UI"
    size: 80
    color: "#FFFFFF"
    outline_color: "#000000"
    outline_width: 3
    shadow: 1
    alignment: 5                    # Center / Middle alignment
    margin_vertical: 80
    bold: true
    background_box: false
    background_color: "#00000085"

  verse_number:
    show: true
    color: "#FFC080"
    size: 44
    margin_bottom: 65
    on_every_segment: false

  overlay:
    enabled: true
    title: true                     # Automatically derives title from book and chapter
    title_color: "#FFFFFF"
    title_position: 5
    subtitle: "SINDHI AUDIO BIBLE"
    subtitle_position: 5
    watermark_text: "PARMESHWERJOPYAAR"
    watermark_position: 4
    watermark_opacity: 0.50
    divider_line: true

# ==============================================================================
# Batch Jobs Queue
# ==============================================================================
