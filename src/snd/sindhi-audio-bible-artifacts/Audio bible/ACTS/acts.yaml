  - usfm: "src/snd/45ACTsnd.SFM"
    timing: "src/snd/sindhi-audio-bible-artifacts/Audio bible/ACTS/Timing file/C01-04-ACT-01-timing.txt"
    audio: "src/snd/sindhi-audio-bible-artifacts/Audio bible/ACTS/Audio/Acts 001.mp3"
