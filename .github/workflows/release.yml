name: Release VIDX

on:
  push:
    tags:
      - 'v*' # Trigger workflow on version tags like v0.1.0, v1.0.0, etc.
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

# Explicitly grant write permissions required for creating GitHub Releases and uploading assets
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Package & Create Release
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all tags and history for accurate changelogs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Build & Runtime Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel pyinstaller
          pip install -r requirements.txt
          pip install -e .

      - name: Build Python Distribution (Wheel & sdist)
        run: |
          python -m build --no-isolation --outdir dist/

      - name: Build Windows Executable (.exe) with PyInstaller
        run: |
          pyinstaller --onefile --name vidx --clean vidx_entry.py

      - name: Generate Release Notes Summary
        id: release_notes
        run: |
          echo "## 🚀 VIDX Release ${GITHUB_REF#refs/tags/}" > release_notes.md
          echo "" >> release_notes.md
          echo "Official video rendering companion to **AUDX** (Audio Scripture Conversion Tool suite)." >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🖥️ Standalone Windows Executable (.exe)" >> release_notes.md
          echo "For Windows users without Python installed, download **\`vidx.exe\`** attached below and place it in your project folder. Run it directly from Command Prompt or PowerShell:" >> release_notes.md
          echo '```powershell' >> release_notes.md
          echo ".\vidx.exe -c project.yaml" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 Installation from Wheel" >> release_notes.md
          echo "You can also download the \`.whl\` file attached below and install it via pip:" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "pip install vidx-*.whl" >> release_notes.md
          echo '```' >> release_notes.md

      - name: Create GitHub Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/vidx.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
