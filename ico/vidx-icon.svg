  <rect x="194" y="226" width="9" height="37" rx="2" ry="2" fill="#F2B134"/>
  <rect x="213" y="236" width="9" height="27" rx="2" ry="2" fill="#F2B134"/>
  <rect x="232" y="220" width="9" height="43" rx="2" ry="2" fill="#F2B134"/>
  <rect x="251" y="238" width="9" height="25" rx="2" ry="2" fill="#F2B134"/>
