<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 70 320 213">
  <!-- back page -->
  <path d="M60,230 L200,190 L200,90 L60,130 Z" fill="#ECE6D6" stroke="#1A1A2E" stroke-width="8"/>
  <!-- front page -->
  <path d="M340,230 L200,190 L200,90 L340,130 Z" fill="#F7F3E7" stroke="#1A1A2E" stroke-width="8"/>
  <!-- page text lines -->
  <g stroke="#A49B87" stroke-width="1.6" stroke-linecap="round">
    <line x1="60" y1="153" x2="200" y2="122.2"/>
    <line x1="60" y1="174" x2="200" y2="143.2"/>
    <line x1="60" y1="194" x2="200" y2="163.2"/>
